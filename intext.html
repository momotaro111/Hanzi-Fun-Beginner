<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語漢字打字挑戰 - TOCFL 1-2</title>
    <style>
        :root {
            --primary-color: #FF9F1C;
            --secondary-color: #2EC4B6;
            --bg-color: #CBF3F0;
            --text-color: #2F3E46;
            --success-color: #4CAF50;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            position: relative;
            z-index: 10;
        }

        .progress-container {
            width: 100%;
            background-color: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        #progress-bar {
            width: 0%;
            height: 10px;
            background-color: var(--secondary-color);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        #stats {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        #target-char {
            font-size: 120px;
            margin: 20px 0;
            color: var(--text-color);
            transition: transform 0.2s, color 0.2s;
        }

        #input-field {
            font-size: 24px;
            padding: 10px;
            width: 80%;
            border: 3px solid #ddd;
            border-radius: 10px;
            text-align: center;
            outline: none;
        }

        #input-field:focus {
            border-color: var(--primary-color);
        }

        /* 答對特效 */
        .correct {
            color: var(--success-color) !important;
            transform: scale(1.2);
        }

        /* 煙火畫布 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 結算畫面 */
        #result-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .char-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .char-item {
            font-size: 24px;
            background: var(--secondary-color);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e68a00;
        }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <div id="game-container">
        <div id="stats">進度: <span id="current-count">0</span> / 50</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        
        <div id="target-char">載入中...</div>
        
        <input type="text" id="input-field" placeholder="請在此輸入漢字" autocomplete="off">
    </div>

    <div id="result-screen">
        <h1>恭喜完成挑戰！🎉</h1>
        <p>你今天練習了以下漢字：</p>
        <div class="char-list" id="final-list"></div>
        <button onclick="startGame()">再玩一次</button>
    </div>

    <script>
        // TOCFL 1-2 級常用字庫 (精選 80 字，遊戲會從中隨機挑選 50 字)
        const wordBank = [
            "我", "你", "他", "她", "我們", "你們", "他們", "這", "那", "誰", 
            "什麼", "多少", "幾", "不", "很", "太", "都", "和", "在", "有", 
            "要", "會", "能", "可以", "做", "去", "來", "吃", "喝", "看", 
            "聽", "說", "讀", "寫", "學", "認識", "高興", "好", "大", "小", 
            "多", "少", "冷", "熱", "漂亮", "家", "學校", "飯店", "商店", "老師", 
            "學生", "朋友", "醫生", "爸爸", "媽媽", "兒子", "女兒", "先生", "太太", "小姐",
            "天", "月", "日", "星期", "點", "現在", "今天", "明天", "昨天", "謝謝",
            "不客氣", "對不起", "沒關係", "再見", "請", "叫", "買", "開", "坐", "住"
        ];

        let gameWords = [];
        let currentIndex = 0;
        const totalRounds = 50;
        const targetDisplay = document.getElementById('target-char');
        const inputField = document.getElementById('input-field');
        const countDisplay = document.getElementById('current-count');
        const progressBar = document.getElementById('progress-bar');
        const finalList = document.getElementById('final-list');

        // 初始化遊戲
        function startGame() {
            // 隨機打亂並選取 50 個字
            gameWords = [...wordBank].sort(() => 0.5 - Math.random()).slice(0, totalRounds);
            currentIndex = 0;
            document.getElementById('result-screen').style.display = 'none';
            inputField.value = '';
            inputField.focus();
            updateDisplay();
        }

        // 更新顯示內容
        function updateDisplay() {
            if (currentIndex >= totalRounds) {
                showFinalResult();
                return;
            }

            const currentWord = gameWords[currentIndex];
            targetDisplay.innerText = currentWord;
            targetDisplay.classList.remove('correct');
            countDisplay.innerText = currentIndex;
            progressBar.style.width = (currentIndex / totalRounds * 100) + '%';
            
            speakWord(currentWord);
        }

        // 發音功能：根據進度調整語速
        function speakWord(word) {
            // 停止之前的發音
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'zh-TW';
            
            // 語速邏輯：從 0.7 (慢) 到 1.1 (快)
            // 進度越後面越快
            let rate = 0.7 + (currentIndex / totalRounds) * 0.4;
            msg.rate = rate;
            
            window.speechSynthesis.speak(msg);
        }

        // 監聽輸入
        inputField.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            const target = gameWords[currentIndex];

            if (val === target) {
                handleCorrect();
            }
        });

        // 答對處理
        function handleCorrect() {
            targetDisplay.classList.add('correct');
            createFirework();
            
            setTimeout(() => {
                currentIndex++;
                inputField.value = '';
                updateDisplay();
            }, 300);
        }

        // 結算畫面
        function showFinalResult() {
            document.getElementById('result-screen').style.display = 'flex';
            finalList.innerHTML = gameWords.map(w => `<span class="char-item">${w}</span>`).join('');
            countDisplay.innerText = totalRounds;
            progressBar.style.width = '100%';
        }

        // --- 簡易煙火特效 ---
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function createFirework() {
            const particles = [];
            const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            for(let i=0; i<30; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0
                });
            }
            animateFirework(particles);
        }

        function animateFirework(particles) {
            function step() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                let alive = false;
                particles.forEach(p => {
                    if(p.life > 0) {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.life -= 0.02;
                        ctx.fillStyle = `rgba(76, 175, 80, ${p.life})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                        ctx.fill();
                        alive = true;
                    }
                });
                if(alive) requestAnimationFrame(step);
            }
            step();
        }

        // 啟動遊戲
        window.onload = startGame;
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
