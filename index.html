<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語三階段挑戰 - 打字/意義/造句</title>
    <style>
        :root {
            --primary-color: #FF9F1C;
            --secondary-color: #2EC4B6;
            --bg-color: #CBF3F0;
            --text-color: #2F3E46;
            --success-color: #4CAF50;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: white;
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        .progress-container { width: 100%; background: #eee; border-radius: 10px; margin-bottom: 10px; }
        #progress-bar { height: 12px; background: var(--secondary-color); border-radius: 10px; width: 0%; transition: 0.3s; }
        
        #instruction { font-size: 1.2rem; color: #666; margin-bottom: 15px; font-weight: bold; }
        #display-area { min-height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        #target-char { font-size: 100px; margin: 10px 0; }
        
        /* 階段 1: 輸入框 */
        #input-field { font-size: 24px; padding: 12px; width: 80%; border: 3px solid #ddd; border-radius: 15px; text-align: center; }

        /* 階段 2: 選項 */
        #options-container { display: none; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .option-btn { background: white; border: 2px solid var(--secondary-color); padding: 12px; font-size: 18px; border-radius: 12px; cursor: pointer; }
        .option-btn:hover { background: var(--secondary-color); color: white; }

        /* 階段 3: 造句 */
        #sentence-area { display: none; width: 100%; }
        #sentence-text { font-size: 24px; background: #f0fdfa; padding: 20px; border-radius: 15px; margin-bottom: 20px; line-height: 1.6; }
        .highlight { color: var(--primary-color); font-weight: bold; border-bottom: 2px solid; }

        .btn-next { background: var(--primary-color); color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; }

        #fireworks { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

        #result-screen { display: none; position: fixed; inset: 0; background: white; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <div id="game-container">
        <div id="stats">進度: <span id="current-count">0</span> / 50</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div id="instruction">請打出這個漢字</div>
        
        <div id="display-area">
            <div id="target-char">...</div>
            <input type="text" id="input-field" placeholder="請打字..." autocomplete="off">
            
            <div id="options-container"></div>
            
            <div id="sentence-area">
                <div id="sentence-text"></div>
                <button class="btn-next" onclick="finishTurn()">下一個字 ➔</button>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <h1>太棒了！練習完成 🎉</h1>
        <button class="btn-next" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const wordData = [
            {w: "漂亮", m: "Beautiful", s: "你的衣服非常<span class='highlight'>漂亮</span>！"},
            {w: "學生", m: "Student", s: "大衛是一個好<span class='highlight'>學生</span>。"},
            {w: "喜歡", m: "To like", s: "你<span class='highlight'>喜歡</span>吃什麼水果？"},
            {w: "現在", m: "Now", s: "<span class='highlight'>現在</span>是下午兩點鐘。"},
            {w: "天氣", m: "Weather", s: "今天的<span class='highlight'>天氣</span>非常熱。"},
            {w: "商店", m: "Shop", s: "這間<span class='highlight'>商店</span>買不到電腦。"},
            {w: "認識", m: "To know", s: "很高興能<span class='highlight'>認識</span>你。"},
            {w: "謝謝", m: "Thank you", s: "<span class='highlight'>謝謝</span>你幫我的忙。"},
            {w: "家", m: "Home", s: "我<span class='highlight'>家</span>附近有一個公園。"},
            {w: "學習", m: "To study", s: "他在台灣<span class='highlight'>學習</span>中文。"}
        ];

        let currentList = [];
        let currentIndex = 0;
        const total = 10; // 測試用 10，可自行改回 50

        // 遊戲狀態機：'typing', 'meaning', 'sentence'
        let state = 'typing'; 

        function init() {
            currentList = [...wordData].sort(() => 0.5 - Math.random()).slice(0, total);
            showStage();
        }

        function showStage() {
            const data = currentList[currentIndex];
            document.getElementById('current-count').innerText = currentIndex;
            document.getElementById('progress-bar').style.width = (currentIndex/total*100) + '%';

            if (state === 'typing') {
                document.getElementById('instruction').innerText = "第一步：打出這個漢字";
                document.getElementById('target-char').style.display = "block";
                document.getElementById('target-char').innerText = data.w;
                document.getElementById('input-field').style.display = "block";
                document.getElementById('input-field').value = "";
                document.getElementById('input-field').focus();
                document.getElementById('options-container').style.display = "none";
                document.getElementById('sentence-area').style.display = "none";
                speak(data.w);
            } 
            else if (state === 'meaning') {
                document.getElementById('instruction').innerText = "第二步：這個詞的意思是？";
                document.getElementById('input-field').style.display = "none";
                document.getElementById('options-container').style.display = "grid";
                renderOptions(data);
            } 
            else if (state === 'sentence') {
                document.getElementById('instruction').innerText = "第三步：閱讀造句並聽發音";
                document.getElementById('target-char').style.display = "none";
                document.getElementById('options-container').style.display = "none";
                document.getElementById('sentence-area').style.display = "block";
                const sentenceEl = document.getElementById('sentence-text');
                sentenceEl.innerHTML = data.s;
                speak(sentenceEl.innerText); // 朗讀造句
            }
        }

        function renderOptions(data) {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            let opts = [data.m];
            while(opts.length < 3) {
                let r = wordData[Math.floor(Math.random()*wordData.length)].m;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => 0.5 - Math.random()).forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = o;
                btn.onclick = () => {
                    if(o === data.m) {
                        createFirework();
                        state = 'sentence';
                        showStage();
                    }
                };
                container.appendChild(btn);
            });
        }

        // 監聽打字
        document.getElementById('input-field').addEventListener('input', (e) => {
            if (state === 'typing' && e.target.value.trim() === currentList[currentIndex].w) {
                state = 'meaning';
                setTimeout(showStage, 200);
            }
        });

        // 結束此回合，進入下一個字
        function finishTurn() {
            currentIndex++;
            if (currentIndex >= total) {
                document.getElementById('result-screen').style.display = 'flex';
            } else {
                state = 'typing';
                showStage();
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.6 + (currentIndex / total) * 0.4; // 語速隨進度變快
            window.speechSynthesis.speak(msg);
        }

        // 煙火特效
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function createFirework() {
            let particles = [];
            for(let i=0; i<30; i++) {
                particles.push({
                    x: window.innerWidth/2, y: window.innerHeight/2,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 1.0, color: `rgba(46, 196, 182,`
                });
            }
            function anim() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    ctx.fillStyle = p.color + p.life + ")";
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill();
                });
                particles = particles.filter(p => p.life > 0);
                if(particles.length > 0) requestAnimationFrame(anim);
            }
            anim();
        }

        window.onload = init;
    </script>
</body>
</html>
