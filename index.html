<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語圖文生詞挑戰</title>
    <style>
        :root { --primary: #FF9F1C; --secondary: #2EC4B6; --bg: #F0F9F8; --text: #2F3E46; --success: #4CAF50; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #game-box { background: white; width: 90%; max-width: 600px; padding: 35px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; position: relative; z-index: 10; }
        
        .progress-wrapper { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px; }
        #bar { height: 100%; width: 0%; background: var(--secondary); border-radius: 5px; transition: 0.4s; }

        .phase { display: none; flex-direction: column; align-items: center; min-height: 350px; justify-content: center; }
        .active { display: flex; }

        .word-img { width: 220px; height: 220px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .big-char { font-size: 85px; margin: 10px 0; font-weight: bold; color: var(--text); }
        
        input { font-size: 26px; padding: 15px; width: 80%; border: 3px solid #ddd; border-radius: 15px; text-align: center; outline: none; }
        input:focus { border-color: var(--primary); }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; }
        .opt-btn { background: white; border: 2px solid var(--secondary); padding: 15px; font-size: 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .opt-btn:hover { background: var(--secondary); color: white; }

        .sentence-card { background: #fff8f0; padding: 25px; border-radius: 20px; font-size: 24px; line-height: 1.6; width: 100%; margin-bottom: 20px; border-left: 8px solid var(--primary); }
        .hl { color: var(--primary); font-weight: bold; text-decoration: underline; }

        .btn-next { background: var(--success); color: white; border: none; padding: 15px 50px; font-size: 20px; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="game-box">
        <div id="info" style="margin-bottom:5px;">進度：<span id="cur">1</span> / 10</div>
        <div class="progress-wrapper"><div id="bar"></div></div>

        <div id="p1" class="phase active">
            <img id="img-p1" class="word-img" src="">
            <div class="big-char" id="char-p1"></div>
            <input type="text" id="typer" placeholder="請輸入漢字..." autocomplete="off">
        </div>

        <div id="p2" class="phase">
            <img id="img-p2" class="word-img" src="">
            <div class="big-char" id="char-p2" style="font-size: 50px;"></div>
            <div class="options-grid" id="opts"></div>
        </div>

        <div id="p3" class="phase">
            <h2 style="color:#7f8c8d;">範例造句</h2>
            <div class="sentence-card" id="display-s"></div>
            <button class="btn-next" onclick="nextWord()">下一個生詞 ➔</button>
        </div>

        <div id="p-end" class="phase">
            <h1 style="font-size: 50px;">🎉 太棒了！</h1>
            <p>你已經完成所有練習了。</p>
            <button class="btn-next" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script>
        // 資料庫：包含生詞、意義、圖片、系統造句
        const db = [
            {w: "漂亮", m: "Beautiful", img: "https://images.unsplash.com/photo-1518893063132-36e46dbe2428?w=400", s: "你的衣服非常<span class='hl'>漂亮</span>！"},
            {w: "咖啡", m: "Coffee", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400", s: "我不喜歡喝苦的<span class='hl'>咖啡</span>。"},
            {w: "學習", m: "To study", img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400", s: "他在學校努力<span class='hl'>學習</span>中文。"},
            {w: "水果", m: "Fruit", img: "https://images.unsplash.com/photo-1610832958506-ee56366376c8?w=400", s: "多吃<span class='hl'>水果</span>對身體很好。"},
            {w: "醫生", m: "Doctor", img: "https://images.unsplash.com/photo-1537368910025-700350fe46c7?w=400", s: "生病的時候要去看<span class='hl'>醫生</span>。"},
            {w: "天氣", m: "Weather", img: "https://images.unsplash.com/photo-1592210454359-9043f067919b?w=400", s: "今天的<span class='hl'>天氣</span>真的很熱。"},
            {w: "認識", m: "To know", img: "https://images.unsplash.com/photo-1521791136364-798a7bc0d262?w=400", s: "很高興能<span class='hl'>認識</span>新朋友。"},
            {w: "商店", m: "Shop", s: "這間<span class='hl'>商店</span>買不到電腦。", img: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=400"},
            {w: "謝謝", m: "Thank you", s: "<span class='hl'>謝謝</span>你送我的生日禮物。", img: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=400"},
            {w: "現在", m: "Now", s: "<span class='hl'>現在</span>是下午兩點鐘。", img: "https://images.unsplash.com/photo-1508921334179-4639948d3c2d?w=400"}
        ];

        let words = [];
        let idx = 0;
        const totalCount = 10;

        function start() {
            words = [...db].sort(() => Math.random() - 0.5).slice(0, totalCount);
            render();
        }

        function render() {
            if(idx >= words.length) { showPhase('p-end'); return; }
            
            const item = words[idx];
            document.getElementById('cur').innerText = idx + 1;
            document.getElementById('bar').style.width = ((idx+1)/totalCount*100) + '%';
            
            // 填寫內容
            document.getElementById('img-p1').src = item.img;
            document.getElementById('char-p1').innerText = item.w;
            document.getElementById('img-p2').src = item.img;
            document.getElementById('char-p2').innerText = item.w;
            document.getElementById('display-s').innerHTML = item.s;

            showPhase('p1');
            speak(item.w);
            const typer = document.getElementById('typer');
            typer.value = "";
            setTimeout(() => typer.focus(), 100);
        }

        function showPhase(id) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 階段 1 監聽打字
        document.getElementById('typer').addEventListener('input', (e) => {
            if(e.target.value.trim() === words[idx].w) {
                setTimeout(goPhase2, 400);
            }
        });

        function goPhase2() {
            showPhase('p2');
            const item = words[idx];
            const optBox = document.getElementById('opts');
            optBox.innerHTML = "";
            
            let choices = [item.m];
            while(choices.length < 3) {
                let r = db[Math.floor(Math.random()*db.length)].m;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5).forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = c;
                btn.onclick = () => { if(c === item.m) { triggerFirework(); goPhase3(); } };
                optBox.appendChild(btn);
            });
        }

        function goPhase3() {
            showPhase('p3');
            // 自動朗讀造句
            speak(document.getElementById('display-s').innerText);
        }

        function nextWord() {
            idx++;
            render();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        // 煙火特效
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        function triggerFirework() {
            let particles = [];
            for(let i=0; i<30; i++) {
                particles.push({x:window.innerWidth/2, y:window.innerHeight/2, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, l:1, c:`hsla(${Math.random()*360},100%,50%,`});
            }
            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.x+=p.vx; p.y+=p.vy; p.l-=0.025;
                    ctx.fillStyle = p.c + p.l + ")";
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill();
                });
                particles = particles.filter(p => p.l > 0);
                if(particles.length) requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = start;
    </script>
</body>
</html>
