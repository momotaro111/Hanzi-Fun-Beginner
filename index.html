<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語全方位學習遊戲</title>
    <style>
        :root {
            --primary: #FF9F1C;
            --secondary: #2EC4B6;
            --bg: #CBF3F0;
            --white: #FFFFFF;
            --text: #2F3E46;
            --success: #4CAF50;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-box {
            background: var(--white);
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* 進度條 */
        .progress-info { font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .progress-wrapper { width: 100%; background: #eee; height: 12px; border-radius: 6px; margin-bottom: 30px; }
        #bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--secondary), var(--primary)); border-radius: 6px; transition: 0.4s; }

        /* 階段控制 */
        .phase { display: none; min-height: 300px; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }

        .instruction { font-size: 1.2rem; color: #7f8c8d; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 10px; }
        .big-char { font-size: 120px; margin: 20px 0; color: var(--text); }

        /* 輸入框樣式 */
        #typer {
            font-size: 28px; padding: 15px; width: 80%;
            border: 3px solid #ddd; border-radius: 15px; text-align: center; outline: none;
            transition: border-color 0.3s;
        }
        #typer:focus { border-color: var(--primary); }

        /* 選擇題樣式 */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; }
        .opt-btn {
            background: var(--white); border: 2px solid var(--secondary);
            padding: 18px; font-size: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .opt-btn:hover { background: var(--secondary); color: white; transform: translateY(-2px); }

        /* 造句卡片樣式 */
        .sentence-card {
            background: #fdf2e9; padding: 30px; border-radius: 20px;
            font-size: 26px; line-height: 1.6; margin-bottom: 25px; width: 100%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .hl { color: var(--primary); font-weight: bold; text-decoration: underline; }

        .next-btn {
            background: var(--success); color: white; border: none;
            padding: 15px 50px; font-size: 20px; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        .next-btn:hover { background: #43A047; }

        #canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="game-box">
        <div class="progress-info">目前進度：<span id="cur">0</span> / 10</div>
        <div class="progress-wrapper"><div id="bar"></div></div>

        <div id="p1" class="phase active">
            <div class="instruction">步驟 1：請準確打出這個漢字</div>
            <p class="big-char" id="display-w"></p>
            <input type="text" id="typer" placeholder="請在此輸入..." autocomplete="off">
        </div>

        <div id="p2" class="phase">
            <div class="instruction">步驟 2：這個生詞是什麼意思？</div>
            <p class="big-char" id="display-w2" style="font-size: 70px;"></p>
            <div class="options-grid" id="opts"></div>
        </div>

        <div id="p3" class="phase">
            <div class="instruction">步驟 3：閱讀造句應用並聽發音</div>
            <div class="sentence-card" id="display-s"></div>
            <button class="next-btn" onclick="goToNextWord()">完成，下一個生詞 ➔</button>
        </div>

        <div id="p-end" class="phase">
            <h1 style="font-size: 50px;">🎉 恭喜！</h1>
            <p style="font-size: 20px;">你已經完成了今天的漢字與造句練習。</p>
            <button class="next-btn" onclick="location.reload()">重新挑戰</button>
        </div>
    </div>

    <script>
        // 資料庫 (可自行增加到 50 個)
        const db = [
            {w: "漂亮", m: "Beautiful", s: "你的衣服非常<span class='hl'>漂亮</span>！"},
            {w: "學生", m: "Student", s: "大衛是一個認真的好<span class='hl'>學生</span>。"},
            {w: "醫生", m: "Doctor", s: "生病的時候要去看<span class='hl'>醫生</span>。"},
            {w: "喜歡", m: "To like", s: "我最<span class='hl'>喜歡</span>吃台灣的水果。"},
            {w: "現在", m: "Now", s: "<span class='hl'>現在</span>是下午三點鐘。"},
            {w: "天氣", m: "Weather", s: "今天的<span class='hl'>天氣</span>真的很不錯。"},
            {w: "謝謝", m: "Thank you", s: "<span class='hl'>謝謝</span>你幫我的忙。"},
            {w: "認識", m: "To know", s: "很高興能<span class='hl'>認識</span>新朋友。"},
            {w: "咖啡", m: "Coffee", s: "這杯<span class='hl'>咖啡</span>很好喝。"},
            {w: "學習", m: "To study", s: "每天都要努力<span class='hl'>學習</span>中文。"}
        ];

        let words = [];
        let idx = 0;
        const totalCount = 10; // 你可以改為 50

        function start() {
            // 隨機抽選 10 個字 (如果要 50 個，請確保 db 裡面有 50 個字)
            words = [...db].sort(() => Math.random() - 0.5).slice(0, totalCount);
            renderPhase();
        }

        // 渲染目前單字的階段
        function renderPhase() {
            if(idx >= words.length) {
                showPhase('p-end');
                return;
            }

            const item = words[idx];
            document.getElementById('cur').innerText = idx + 1;
            document.getElementById('bar').style.width = ((idx + 1) / totalCount * 100) + '%';

            // 更新內容
            document.getElementById('display-w').innerText = item.w;
            document.getElementById('display-w2').innerText = item.w;
            document.getElementById('display-s').innerHTML = item.s;

            // 預設進入第一階段：打字
            showPhase('p1');
            speak(item.w);

            const input = document.getElementById('typer');
            input.value = "";
            input.focus();
        }

        function showPhase(id) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 監聽打字輸入
        document.getElementById('typer').addEventListener('input', (e) => {
            if(e.target.value.trim() === words[idx].w) {
                // 打對了，自動跳到第二階段：意義
                setTimeout(() => {
                    startMeaningPhase();
                }, 400);
            }
        });

        function startMeaningPhase() {
            showPhase('p2');
            const item = words[idx];
            const optBox = document.getElementById('opts');
            optBox.innerHTML = "";
            
            let choices = [item.m];
            while(choices.length < 3) {
                let randomItem = db[Math.floor(Math.random() * db.length)];
                if(!choices.includes(randomItem.m)) choices.push(randomItem.m);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = c;
                btn.onclick = () => {
                    if(c === item.m) {
                        triggerFirework(); // 答對噴煙火
                        startSentencePhase(); // 跳到第三階段：造句
                    } else {
                        btn.style.borderColor = "red";
                        btn.style.color = "red";
                    }
                };
                optBox.appendChild(btn);
            });
        }

        function startSentencePhase() {
            showPhase('p3');
            const sentenceText = document.getElementById('display-s').innerText;
            speak(sentenceText); // 自動朗讀造句
        }

        function goToNextWord() {
            idx++;
            renderPhase();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            // 語速控制：隨進度稍微變快
            msg.rate = 0.7 + (idx / totalCount) * 0.4; 
            window.speechSynthesis.speak(msg);
        }

        // 簡單煙火特效
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function triggerFirework() {
            let particles = [];
            for(let i=0; i<40; i++) {
                particles.push({
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1.0,
                    color: `hsla(${Math.random() * 360}, 100%, 50%,`
                });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                    ctx.fillStyle = p.color + p.life + ")";
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
                });
                particles = particles.filter(p => p.life > 0);
                if(particles.length > 0) requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = start;
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
