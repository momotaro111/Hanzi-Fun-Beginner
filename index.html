<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語 AI 智慧教學遊戲</title>
    <style>
        :root { --primary: #FF9F1C; --secondary: #2EC4B6; --bg: #F0F9F8; --white: #FFFFFF; --text: #2F3E46; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #game-box { background: var(--white); width: 90%; max-width: 650px; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; position: relative; z-index: 10; }
        
        /* 初始設定畫面 */
        #setup-screen { display: flex; flex-direction: column; align-items: center; }
        #setup-screen input { width: 80%; padding: 12px; margin: 20px 0; border: 2px solid var(--secondary); border-radius: 10px; }

        .phase { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .word-img { width: 180px; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; border: 4px solid var(--bg); }
        .big-char { font-size: 80px; margin: 10px 0; font-weight: bold; }
        
        input[type="text"], textarea { font-size: 22px; padding: 15px; width: 85%; border: 2px solid #ddd; border-radius: 15px; outline: none; }
        input:focus, textarea:focus { border-color: var(--secondary); }

        .options-grid { display: grid; gap: 12px; width: 100%; }
        .opt-btn { padding: 15px; border: 2px solid var(--secondary); border-radius: 12px; background: white; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .opt-btn:hover { background: var(--secondary); color: white; }

        #ai-feedback { margin-top: 15px; padding: 15px; border-radius: 12px; font-size: 18px; width: 85%; min-height: 40px; }
        .ai-loading { color: #888; animation: blink 1s infinite; }
        .ai-error { background: #FFD6D6; color: #D8000C; text-align: left; }
        .ai-success { background: #DFF2BF; color: #4F8A10; font-weight: bold; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-main:hover { transform: scale(1.05); background: #e68a00; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="game-box">
        <div id="setup-screen">
            <h2>歡迎使用華語 AI 教學系統</h2>
            <p>請輸入您的 Gemini API Key 以啟動 AI 語法檢查：</p>
            <input type="password" id="api-key-input" placeholder="貼上 API Key (例如：AIzaSy...)">
            <button class="btn-main" onclick="saveKeyAndStart()">開始遊戲</button>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">(若無 Key，AI 檢查功能將無法運作)</p>
        </div>

        <div id="p1" class="phase">
            <img id="img-p1" class="word-img" src="" alt="word image">
            <div class="big-char" id="char-p1"></div>
            <input type="text" id="typer" placeholder="請打出上面看到的漢字..." autocomplete="off">
        </div>

        <div id="p2" class="phase">
            <img id="img-p2" class="word-img" src="" alt="word image">
            <div class="big-char" id="char-p2" style="font-size: 40px;"></div>
            <div class="options-grid" id="opts"></div>
        </div>

        <div id="p3" class="phase">
            <h3 id="p3-title">請使用生詞造句</h3>
            <textarea id="sentence-input" rows="3" placeholder="請在此輸入完整的句子..."></textarea>
            <div id="ai-feedback"></div>
            <div id="p3-btns">
                <button id="ai-btn" class="btn-main" onclick="checkSentence()">提交 AI 檢查</button>
                <button id="next-btn" class="btn-main" style="display:none;" onclick="nextWord()">下一個生詞 ➔</button>
            </div>
        </div>

        <div id="p-end" class="phase">
            <h1 style="font-size: 40px;">🎉 練習完成！</h1>
            <button class="btn-main" onclick="location.reload()">重新開始</button>
        </div>
    </div>

    <script>
        let API_KEY = "";
        const db = [
            {w: "漂亮", m: "Beautiful", img: "https://images.unsplash.com/photo-1518893063132-36e46dbe2428?w=400"},
            {w: "咖啡", m: "Coffee", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400"},
            {w: "學習", m: "To study", img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400"},
            {w: "水果", m: "Fruit", img: "https://images.unsplash.com/photo-1610832958506-ee56366376c8?w=400"},
            {w: "醫生", m: "Doctor", img: "https://images.unsplash.com/photo-1537368910025-700350fe46c7?w=400"}
        ];

        let idx = 0;
        let words = [...db].sort(() => Math.random() - 0.5);

        function saveKeyAndStart() {
            API_KEY = document.getElementById('api-key-input').value.trim();
            if(!API_KEY) {
                alert("提醒：未輸入 API Key，遊戲將跳過 AI 檢查階段。");
            }
            document.getElementById('setup-screen').style.display = 'none';
            render();
        }

        function render() {
            if(idx >= words.length) { showPhase('p-end'); return; }
            const item = words[idx];
            document.getElementById('img-p1').src = item.img;
            document.getElementById('char-p1').innerText = item.w;
            document.getElementById('typer').value = "";
            showPhase('p1');
            speak(item.w);
            setTimeout(() => document.getElementById('typer').focus(), 100);
        }

        function showPhase(id) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('typer').addEventListener('input', (e) => {
            if(e.target.value.trim() === words[idx].w) {
                setTimeout(goPhase2, 400);
            }
        });

        function goPhase2() {
            const item = words[idx];
            document.getElementById('img-p2').src = item.img;
            document.getElementById('char-p2').innerText = item.w;
            const optBox = document.getElementById('opts');
            optBox.innerHTML = "";
            
            let choices = [item.m];
            while(choices.length < 3) {
                let r = db[Math.floor(Math.random()*db.length)].m;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5).forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = c;
                btn.onclick = () => { if(c === item.m) goPhase3(); };
                optBox.appendChild(btn);
            });
            showPhase('p2');
        }

        function goPhase3() {
            document.getElementById('p3-title').innerHTML = `請使用「<span style="color:var(--primary)">${words[idx].w}</span>」造一個句子：`;
            document.getElementById('sentence-input').value = "";
            document.getElementById('ai-feedback').className = "";
            document.getElementById('ai-feedback').innerText = "";
            document.getElementById('ai-btn').style.display = "inline-block";
            document.getElementById('next-btn').style.display = "none";
            showPhase('p3');
        }

        async function checkSentence() {
            const sentence = document.getElementById('sentence-input').value.trim();
            const target = words[idx].w;
            const feedback = document.getElementById('ai-feedback');
            
            if(!sentence.includes(target)) {
                feedback.className = "ai-error";
                feedback.innerText = `⚠️ 句子裡必須包含生詞「${target}」。`;
                return;
            }

            if(!API_KEY) {
                feedback.className = "ai-success";
                feedback.innerText = "(未設定 API Key，自動通過)";
                finishPhase3();
                return;
            }

            feedback.className = "ai-loading";
            feedback.innerText = "⏳ AI 老師正在檢查語法中...";

            try {
                // 更新為 Gemini 1.5 Flash 穩定版 API 網址
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一位專業華語老師。請檢查這句話語法是否正確且符合「${target}」的用法：『${sentence}』。如果語法正確且自然，請「只」回覆 PASS。如果不正確，請用繁體中文給予「建議修改：」以及「原因：」。不要回覆多餘內容。` }] }]
                    })
                });

                const data = await response.json();
                
                // 檢查 API 回傳錯誤
                if(data.error) throw new Error(data.error.message);

                const result = data.candidates[0].content.parts[0].text.trim();

                if(result.toUpperCase().includes("PASS")) {
                    feedback.className = "ai-success";
                    feedback.innerText = "✅ 太棒了！語法完全正確。";
                    fire();
                    finishPhase3();
                } else {
                    feedback.className = "ai-error";
                    feedback.innerText = result;
                }
            } catch (err) {
                console.error(err);
                feedback.className = "ai-error";
                feedback.innerText = "❌ 無法連接 AI。請檢查 API Key 是否有效，或點擊「跳過」繼續下一題。";
                // 發生錯誤時顯示跳過按鈕
                document.getElementById('next-btn').innerText = "連線失敗，點此跳過";
                document.getElementById('next-btn').style.display = "inline-block";
            }
        }

        function finishPhase3() {
            document.getElementById('ai-btn').style.display = "none";
            document.getElementById('next-btn').innerText = "下一個生詞 ➔";
            document.getElementById('next-btn').style.display = "inline-block";
            speak(document.getElementById('sentence-input').value);
        }

        function nextWord() {
            idx++;
            render();
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'zh-TW';
            window.speechSynthesis.speak(m);
        }

        // 煙火效果
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        function fire() {
            let particles = [];
            for(let i=0; i<30; i++) {
                particles.push({x:window.innerWidth/2, y:window.innerHeight/2, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, l:1, c:`hsla(${Math.random()*360},100%,50%,`});
            }
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.x+=p.vx; p.y+=p.vy; p.l-=0.02;
                    ctx.fillStyle = p.c + p.l + ")";
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill();
                });
                particles = particles.filter(p => p.l > 0);
                if(particles.length) requestAnimationFrame(anim);
            }
            anim();
        }
    </script>
</body>
</html>
