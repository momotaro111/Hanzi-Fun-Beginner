<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語 AI 造句挑戰</title>
    <style>
        :root {
            --primary: #FF9F1C;
            --secondary: #2EC4B6;
            --bg: #F0F9F8;
            --white: #FFFFFF;
            --text: #2F3E46;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg);
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
        }

        #game-box {
            background: var(--white); width: 95%; max-width: 700px;
            padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center; position: relative; z-index: 10;
        }

        .phase { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* 圖片樣式 */
        .word-img { width: 200px; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 10px; border: 5px solid var(--bg); }

        .big-char { font-size: 80px; margin: 10px 0; color: var(--text); }
        
        input, textarea {
            font-size: 20px; padding: 15px; width: 85%; border: 2px solid #ddd;
            border-radius: 12px; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--secondary); }

        .options-grid { display: grid; gap: 10px; width: 100%; }
        .opt-btn { padding: 15px; border: 2px solid var(--secondary); border-radius: 12px; background: none; cursor: pointer; font-size: 18px; }
        .opt-btn:hover { background: var(--secondary); color: white; }

        /* AI 回饋區域 */
        #ai-feedback {
            margin-top: 15px; padding: 15px; border-radius: 12px; font-size: 18px;
            min-height: 50px; width: 85%; line-height: 1.5;
        }
        .ai-loading { color: #888; font-style: italic; }
        .ai-error { background: #FFD6D6; color: #D8000C; }
        .ai-success { background: #DFF2BF; color: #4F8A10; }

        .btn-main {
            background: var(--primary); color: white; border: none; padding: 15px 40px;
            font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 20px;
        }
        
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="game-box">
        <div id="p1" class="phase active">
            <img id="img-p1" class="word-img" src="" alt="word image">
            <div class="big-char" id="char-p1"></div>
            <input type="text" id="typer" placeholder="請打出這個漢字..." autocomplete="off">
        </div>

        <div id="p2" class="phase">
            <img id="img-p2" class="word-img" src="" alt="word image">
            <div class="big-char" id="char-p2" style="font-size: 40px;"></div>
            <div class="options-grid" id="opts"></div>
        </div>

        <div id="p3" class="phase">
            <h3>請使用「<span id="target-word-s" style="color:var(--primary)"></span>」造一個句子：</h3>
            <textarea id="sentence-input" rows="3" placeholder="例如：我今天很漂亮。"></textarea>
            <div id="ai-feedback"></div>
            <button id="ai-btn" class="btn-main" onclick="checkSentence()">提交 AI 檢查</button>
            <button id="next-btn" class="btn-main" style="display:none;" onclick="nextWord()">下一個生詞 ➔</button>
        </div>
    </div>

    <script>
        // 請在此處填入你的 Gemini API Key
        const API_KEY = "YOUR_GEMINI_API_KEY"; 

        const db = [
            {w: "漂亮", m: "Beautiful", img: "https://images.unsplash.com/photo-1518893063132-36e46dbe2428?w=400"},
            {w: "咖啡", m: "Coffee", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400"},
            {w: "學習", m: "To study", img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400"}
            // 可以繼續增加圖片網址
        ];

        let idx = 0;
        let words = [...db].sort(() => Math.random() - 0.5);

        function init() {
            render();
        }

        function render() {
            const item = words[idx];
            document.getElementById('img-p1').src = item.img;
            document.getElementById('char-p1').innerText = item.w;
            document.getElementById('typer').value = "";
            showPhase('p1');
            speak(item.w);
        }

        function showPhase(id) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 階段 1 監聽
        document.getElementById('typer').addEventListener('input', (e) => {
            if(e.target.value.trim() === words[idx].w) {
                setTimeout(goPhase2, 500);
            }
        });

        function goPhase2() {
            const item = words[idx];
            document.getElementById('img-p2').src = item.img;
            document.getElementById('char-p2').innerText = item.w;
            const optBox = document.getElementById('opts');
            optBox.innerHTML = "";
            
            let choices = [item.m];
            while(choices.length < 3) {
                let r = db[Math.floor(Math.random()*db.length)].m;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5).forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = c;
                btn.onclick = () => { if(c === item.m) goPhase3(); };
                optBox.appendChild(btn);
            });
            showPhase('p2');
        }

        function goPhase3() {
            document.getElementById('target-word-s').innerText = words[idx].w;
            document.getElementById('sentence-input').value = "";
            document.getElementById('ai-feedback').className = "";
            document.getElementById('ai-feedback').innerText = "";
            document.getElementById('ai-btn').style.display = "inline-block";
            document.getElementById('next-btn').style.display = "none";
            showPhase('p3');
        }

        // 調用 AI 檢查語法
        async function checkSentence() {
            const sentence = document.getElementById('sentence-input').value.trim();
            const target = words[idx].w;
            const feedback = document.getElementById('ai-feedback');
            
            if(!sentence.includes(target)) {
                feedback.className = "ai-error";
                feedback.innerText = `句子裡必須包含生詞「${target}」喔！`;
                return;
            }

            feedback.className = "ai-loading";
            feedback.innerText = "AI 正在思考中...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一位專業的華語老師。請判斷這句話語法是否正確且符合「${target}」的用法：『${sentence}』。如果完全正確，請只回覆「PASS」。如果不正確，請簡短給予「建議修改：」以及「原因：」。` }] }]
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;

                if(result.includes("PASS")) {
                    feedback.className = "ai-success";
                    feedback.innerText = "太棒了！語法完全正確。";
                    fire();
                    document.getElementById('ai-btn').style.display = "none";
                    document.getElementById('next-btn').style.display = "inline-block";
                    speak(sentence);
                } else {
                    feedback.className = "ai-error";
                    feedback.innerText = result;
                }
            } catch (err) {
                feedback.innerText = "連線 AI 失敗，請檢查 API Key 或網路。";
            }
        }

        function nextWord() {
            idx++;
            if(idx < words.length) render();
            else alert("全數完成！");
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'zh-TW';
            window.speechSynthesis.speak(m);
        }

        // 煙火 (簡化版)
        function fire() { /* 煙火邏輯同上個版本... */ }

        window.onload = init;
    </script>
</body>
</html>
