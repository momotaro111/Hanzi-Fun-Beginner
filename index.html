<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語 AI 智慧挑戰 (修正版)</title>
    <style>
        :root { --primary: #FF9F1C; --secondary: #2EC4B6; --bg: #F0F9F8; --text: #2F3E46; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #game-box { background: white; width: 90%; max-width: 650px; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; }
        .phase { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .word-img { width: 180px; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; border: 4px solid #eee; }
        .big-char { font-size: 80px; margin: 10px 0; font-weight: bold; }
        input, textarea { font-size: 20px; padding: 15px; width: 85%; border: 2px solid #ddd; border-radius: 12px; outline: none; }
        .opt-btn { padding: 15px; border: 2px solid var(--secondary); border-radius: 12px; background: white; cursor: pointer; font-size: 18px; margin: 5px; width: 100%; }
        #ai-feedback { margin-top: 15px; padding: 15px; border-radius: 12px; font-size: 16px; width: 85%; min-height: 40px; }
        .ai-error { background: #FFD6D6; color: #D8000C; }
        .ai-success { background: #DFF2BF; color: #4F8A10; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 10px; }
        #skip-btn { background: #95a5a6; margin-top: 5px; font-size: 14px; padding: 10px 20px; }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="game-box">
        <div id="setup-screen">
            <h2>輸入 API Key 開始遊戲</h2>
            <input type="password" id="api-key-input" placeholder="貼上你的 API Key">
            <button class="btn-main" onclick="start()">開始</button>
        </div>

        <div id="p1" class="phase">
            <img id="img-p1" class="word-img" src="">
            <div class="big-char" id="char-p1"></div>
            <input type="text" id="typer" placeholder="打出漢字..." autocomplete="off">
        </div>

        <div id="p2" class="phase">
            <img id="img-p2" class="word-img" src="">
            <div class="big-char" id="char-p2" style="font-size:40px"></div>
            <div id="opts" style="width:100%"></div>
        </div>

        <div id="p3" class="phase">
            <h3 id="target-title">造句</h3>
            <textarea id="sentence-input" rows="3"></textarea>
            <div id="ai-feedback"></div>
            <button id="ai-btn" class="btn-main" onclick="checkSentence()">提交 AI 檢查</button>
            <button id="skip-btn" class="btn-main" style="display:none" onclick="finishPhase3()">連線失敗，點此強制跳過</button>
            <button id="next-btn" class="btn-main" style="display:none" onclick="nextWord()">下一個 ➔</button>
        </div>
    </div>

    <script>
        let KEY = "";
        const db = [
            {w: "漂亮", m: "Beautiful", img: "https://images.unsplash.com/photo-1518893063132-36e46dbe2428?w=400"},
            {w: "咖啡", m: "Coffee", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400"},
            {w: "學習", m: "To study", img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400"}
        ];
        let idx = 0;

        function start() {
            KEY = document.getElementById('api-key-input').value.trim();
            document.getElementById('setup-screen').style.display = 'none';
            render();
        }

        function render() {
            if(idx >= db.length) { alert("全數完成！"); return; }
            showPhase('p1');
            const item = db[idx];
            document.getElementById('img-p1').src = item.img;
            document.getElementById('char-p1').innerText = item.w;
            document.getElementById('typer').value = "";
            document.getElementById('typer').focus();
        }

        function showPhase(id) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('typer').addEventListener('input', (e) => {
            if(e.target.value.trim() === db[idx].w) goPhase2();
        });

        function goPhase2() {
            showPhase('p2');
            const item = db[idx];
            document.getElementById('img-p2').src = item.img;
            document.getElementById('char-p2').innerText = item.w;
            const ob = document.getElementById('opts');
            ob.innerHTML = "";
            [item.m, "Apple", "Water"].sort(()=>Math.random()-0.5).forEach(c => {
                const b = document.createElement('button');
                b.className='opt-btn'; b.innerText=c;
                b.onclick=()=>{ if(c===item.m) goPhase3(); };
                ob.appendChild(b);
            });
        }

        function goPhase3() {
            showPhase('p3');
            document.getElementById('target-title').innerText = `請用「${db[idx].w}」造句：`;
            document.getElementById('sentence-input').value = "";
            document.getElementById('ai-feedback').innerText = "";
            document.getElementById('ai-feedback').className = "";
            document.getElementById('ai-btn').style.display = "inline-block";
            document.getElementById('skip-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
        }

        async function checkSentence() {
            const s = document.getElementById('sentence-input').value.trim();
            const w = db[idx].w;
            const fb = document.getElementById('ai-feedback');
            if(!s.includes(w)) { fb.className="ai-error"; fb.innerText="句子要包含生詞！"; return; }
            
            fb.innerText = "AI 檢查中...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `你是華語老師。判斷這句話語法是否正確：『${s}』。正確請回傳 PASS。不正確請給建議。` }] }] })
                });
                const data = await res.json();
                const txt = data.candidates[0].content.parts[0].text;
                if(txt.toUpperCase().includes("PASS")) {
                    fb.className="ai-success"; fb.innerText="正確！"; fire(); finishPhase3();
                } else {
                    fb.className="ai-error"; fb.innerText=txt;
                }
            } catch (e) {
                fb.className="ai-error"; fb.innerText="連線失敗。您可以點擊下方的跳過按鈕繼續。";
                document.getElementById('skip-btn').style.display = "inline-block";
            }
        }

        function finishPhase3() {
            document.getElementById('ai-btn').style.display = "none";
            document.getElementById('skip-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "inline-block";
        }

        function nextWord() { idx++; render(); }

        function fire() { /* 煙火代碼略 */ }
    </script>
</body>
</html>
